<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="소크라테스 수학 선생님 서비스를 이용하기 위한 인증 페이지입니다.">
  <title>인증 — 소크라테스 수학 선생님</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="socratic_math_demo2.css">
  <style>
    /* 인증 페이지 전용 스타일 보정이 필요한 경우 여기에 추가 */
    #wrapper {
      justify-content: center;
    }
  </style>
</head>

<body>
  <div id="wrapper">
    <div id="key-screen">
      <h2>👩‍🏫 소크라테스 선생님</h2>
      <p>시작하려면 Anthropic API 키를 입력하고 확인을 눌러주세요.<br>키는 이 브라우저 탭에서만 사용되며 어디에도 저장되지 않습니다.</p>
      <input type="password" id="key-input" placeholder="API 키를 입력하세요..." autocomplete="off" />
      <button id="key-submit">키 확인 후 시작</button>
      <div class="key-error" id="key-error"></div>
    </div>
  </div>
  <script src="auth.js"></script>
</body>

</html>
