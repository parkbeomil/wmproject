<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 기반 제작 프로세스 변화</title>
<style>
  @font-face {
    font-family: 'GmarketSansMedium';
    src: local('G마켓 산스 Medium'), local('GmarketSansMedium'),
         url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'GmarketSansBold';
    src: local('G마켓 산스 Bold'), local('GmarketSansBold'),
         url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Gmarket/GmarketSansBold.woff') format('woff');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --slide-w: 1600px;
    --slide-h: 900px;
    --scale: 1;
    --bg: #020617;
  }

  * { box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: #0b1020;
    overflow: hidden;
    font-family: 'GmarketSansMedium', 'G마켓 산스 Medium', 'Noto Sans KR', 'Malgun Gothic', system-ui, sans-serif;
  }

  .presentation {
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
    padding: 0;
  }

  .deck {
    position: relative;
    width: min(100vw, calc(100vh * 16 / 9));
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--bg);
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
  }

  section.slide {
    position: absolute;
    inset: 0;
    display: none;
    background: var(--bg);
    overflow: hidden;
  }
  section.slide.active { display: block; }

  .stage {
    position: absolute;
    left: 0;
    top: 0;
    width: var(--slide-w);
    height: var(--slide-h);
    transform-origin: 0 0;
    transform: scale(var(--scale));
  }

  .el { position: absolute; }
  .ppt-img { object-fit: contain; }
  .text-box {
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    white-space: pre-line;
    line-height: 1.12;
    letter-spacing: -0.02em;
    padding: 0;
  }
  .text-box.middle { align-items: center; }
  .text-box.right { justify-content: flex-end; text-align: right; }
  .text-box.center { justify-content: center; text-align: center; }

  .shape-svg { overflow: visible; }
  .shape-label {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    white-space: pre-line;
    word-break: keep-all;
    overflow-wrap: normal;
    line-height: 1.12;
    letter-spacing: -0.03em;
    padding: 7px 15px;
    color: #000;
  }

  .round-rect {
    position: absolute;
    border-radius: 18px;
    background: transparent;
  }

  .bullet-block {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    line-height: 1.08;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 4px rgba(0,0,0,.43);
  }
  .bullet-line {
    display: grid;
    grid-template-columns: 60px 1fr;
    align-items: baseline;
    white-space: nowrap;
  }
  .bullet-mark { text-align: left; }

  .pager {
    position: absolute;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 30;
    pointer-events: auto;
  }
  .pager button {
    width: 10px;
    height: 10px;
    padding: 0;
    border: 1px solid rgba(255,255,255,.72);
    border-radius: 999px;
    background: rgba(255,255,255,.25);
    cursor: pointer;
  }
  .pager button.active {
    width: 12px;
    height: 12px;
    background: #99FFCC;
    border-color: #99FFCC;
  }

  @media (max-width: 768px) {
    .pager { bottom: 10px; gap: 8px; }
    .pager button { width: 9px; height: 9px; }
  }
</style>
</head>

  </main>

const SVG_NS = 'http://www.w3.org/2000/svg';

function setBox(el, item) {
  el.classList.add('el');
  el.style.left = item.x + 'px';
  el.style.top = item.y + 'px';
  el.style.width = item.w + 'px';
  el.style.height = item.h + 'px';
}

function polygonPoints(type, w, h, adj) {
  const a = Math.max(0.05, Math.min(0.45, adj || 0.2));
  if (type === 'homePlate') {
    const cut = w * (1 - a);
    return `0,0 ${cut},0 ${w},${h/2} ${cut},${h} 0,${h}`;
  }
  if (type === 'chevron') {
    const notch = w * a;
    const cut = w * (1 - a);
    return `0,0 ${cut},0 ${w},${h/2} ${cut},${h} 0,${h} ${notch},${h/2}`;
  }
  return `0,0 ${w},0 ${w},${h} 0,${h}`;
}

function makeShape(item) {
  const svg = document.createElementNS(SVG_NS, 'svg');
  setBox(svg, item);
  svg.classList.add('shape-svg');
  svg.setAttribute('viewBox', `0 0 ${item.w} ${item.h}`);
  svg.setAttribute('preserveAspectRatio', 'none');

  const polygon = document.createElementNS(SVG_NS, 'polygon');
  polygon.setAttribute('points', polygonPoints(item.type, item.w, item.h, item.adj));
  polygon.setAttribute('fill', item.fill || 'transparent');
  if (item.line) {
    polygon.setAttribute('stroke', item.line.color);
    polygon.setAttribute('stroke-width', item.line.width);
    polygon.setAttribute('stroke-linejoin', 'miter');
  } else {
    polygon.setAttribute('stroke', 'none');
  }
  svg.appendChild(polygon);

  if (item.text) {
    const fo = document.createElementNS(SVG_NS, 'foreignObject');
    fo.setAttribute('x', 0);
    fo.setAttribute('y', 0);
    fo.setAttribute('width', item.w);
    fo.setAttribute('height', item.h);
    const div = document.createElement('div');
    div.className = 'shape-label';
    div.textContent = item.text;
    div.style.fontFamily = item.font || 'GmarketSansMedium';
    div.style.fontWeight = item.weight || 500;
    div.style.fontSize = (item.size || 15.56) + 'px';
    div.style.color = item.color || '#000000';
    fo.appendChild(div);
    svg.appendChild(fo);
  }
  return svg;
}

function makeText(item) {
  const div = document.createElement('div');
  setBox(div, item);
  div.className += ' text-box';
  if (item.align === 'right') div.classList.add('right');
  if (item.align === 'center') div.classList.add('center');
  // Rectangle text in the PPT uses vertical middle anchoring.
  if (item.text === 'AI 기반 제작 프로세스 변화 ') div.classList.add('middle');
  div.textContent = item.text || '';
  div.style.color = item.color || '#000000';
  div.style.fontFamily = item.font || 'GmarketSansMedium';
  div.style.fontWeight = item.weight || 500;
  div.style.fontSize = (item.size || 16) + 'px';
  return div;
}

function makeBulletText(item) {
  const div = document.createElement('div');
  setBox(div, item);
  div.className += ' bullet-block';
  div.style.color = item.color;
  div.style.fontFamily = item.font;
  div.style.fontWeight = item.weight;
  div.style.fontSize = item.size + 'px';
  item.lines.forEach(line => {
    const row = document.createElement('div');
    row.className = 'bullet-line';
    const mark = document.createElement('span');
    mark.className = 'bullet-mark';
    mark.textContent = '-';
    const text = document.createElement('span');
    text.textContent = line;
    row.append(mark, text);
    div.appendChild(row);
  });
  return div;
}

function makeImage(item) {
  const img = document.createElement('img');
  setBox(img, item);
  img.className += ' ppt-img';
  img.src = item.src;
  img.alt = item.alt || '';
  return img;
}

function makeRoundRect(item) {
  const div = document.createElement('div');
  setBox(div, item);
  div.className += ' round-rect';
  div.style.border = item.line ? `${item.line.width}px ${item.line.dash && item.line.dash.includes('DOT') ? 'dashed' : 'solid'} ${item.line.color}` : 'none';
  div.style.borderRadius = (item.radius || 18) + 'px';
  return div;
}

function makeRect(item) {
  const div = document.createElement('div');
  setBox(div, item);
  div.style.background = item.fill || 'transparent';
  if (item.line) div.style.border = `${item.line.width}px solid ${item.line.color}`;
  return div;
}

function renderSlides() {
  document.querySelectorAll('.stage').forEach((stage, index) => {
    const slide = slides[index];
    stage.innerHTML = '';
    slide.elements.forEach(item => {
      let el;
      if (item.type === 'image') el = makeImage(item);
      else if (item.type === 'homePlate' || item.type === 'chevron') el = makeShape(item);
      else if (item.type === 'roundRect') el = makeRoundRect(item);
      else if (item.type === 'bulletText') el = makeBulletText(item);
      else if (item.type === 'rect') el = makeRect(item);
      else el = makeText(item);
      stage.appendChild(el);
    });
  });
}

let currentSlide = 0;
function showSlide(index) {
  const sections = [...document.querySelectorAll('section.slide')];
  currentSlide = (index + sections.length) % sections.length;
  sections.forEach((section, i) => section.classList.toggle('active', i === currentSlide));
  document.querySelectorAll('#pager button').forEach((button, i) => button.classList.toggle('active', i === currentSlide));
}

function makePager() {
  const pager = document.getElementById('pager');
  pager.innerHTML = '';
  slides.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('aria-label', `${i + 1}번 슬라이드로 이동`);
    btn.addEventListener('click', () => showSlide(i));
    pager.appendChild(btn);
  });
}

function resizeDeck() {
  const deck = document.getElementById('deck');
  const scale = deck.clientWidth / 1600;
  document.documentElement.style.setProperty('--scale', scale);
}

window.addEventListener('keydown', (event) => {
  if (event.code === 'Space' || event.key === 'ArrowRight') {
    event.preventDefault();
    showSlide(currentSlide + 1);
  }
  if (event.key === 'ArrowLeft') {
    event.preventDefault();
    showSlide(currentSlide - 1);
  }
});
window.addEventListener('resize', resizeDeck);

renderSlides();
makePager();
showSlide(0);
resizeDeck();
</script>
