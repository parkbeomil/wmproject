<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="초등학교 5학년 수학 '배수와 약수' 단원을 친절하게 가르쳐주는 AI 소크라테스 선생님입니다.">
  <title>소크라테스 수학 선생님 — 초등 5학년 배수와 약수</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="socratic_math_demo2.css">
</head>

<body>
  <div id="wrapper">

    <div id="app" style="display: flex;">
      <div id="chat-header">
        <div class="avatar">🦉</div>
        <div>
          <div class="header-title" id="header-title">소크라테스 수학 선생님</div>
          <div class="header-sub" id="header-sub">학년 · 단원</div>
        </div>
        <div style="display:flex; gap:6px; margin-left:auto;">
          <button class="header-btn" id="new-problem-btn">새 문제</button>
          <button class="header-btn" id="reset-key">키 변경</button>
        </div>
      </div>

      <div class="example-chips" id="chips">
        <!-- JS에서 동적으로 생성하거나 숨김 처리 -->
      </div>

      <div id="chat-area">
        <!-- JS에서 동적으로 첫 인사를 생성함 -->
      </div>

      <div id="input-row">
        <textarea id="user-input" placeholder="궁금한 것을 입력해봐..." rows="1"></textarea>
        <button id="send-btn">↑</button>
      </div>
    </div>

  </div>
  <script src="socratic_math_demo2.js?v2=2"></script>
</body>

</html>
