<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배수 짝꿍을 찾아라! 🔍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            padding: 30px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5em;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .game-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .info-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 2em;
            font-weight: bold;
        }

        .timer {
            font-size: 2.5em;
            font-weight: bold;
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .players-section {
            margin-bottom: 30px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .player-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border: 3px solid #e9ecef;
            text-align: center;
            transition: all 0.3s;
        }

        .player-card.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-score {
            font-size: 1.8em;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }

        .btn-secondary:hover {
            background: #dee2e6;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .setup-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .setup-modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-title {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .player-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .player-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            color: white;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(0deg);
        }

        .card:hover:not(.matched):not(.disabled) {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .card.flipped {
            background: white;
            color: #333;
            border: 2px solid #667eea;
            animation: flip 0.6s ease-in-out;
        }

        .card.matched {
            opacity: 0.3;
            cursor: default;
            background: #e9ecef;
        }

        .card.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        @keyframes flip {
            0% { transform: rotateY(-180deg); }
            100% { transform: rotateY(0deg); }
        }

        .card-back {
            font-size: 3em;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .game-over {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-top: 30px;
        }

        .game-over h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .final-scores {
            margin: 20px 0;
        }

        .final-score-item {
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            margin: 10px 0;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 1.8em;
            }

            .game-board {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
            }

            .game-info {
                grid-template-columns: 1fr;
            }

            .players-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .difficulty-select {
            margin: 20px 0;
        }

        .difficulty-select label {
            margin-right: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .difficulty-select input[type="radio"] {
            margin-right: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🔍 배수 짝꿍을 찾아라!</div>
            <p style="color: #666; font-size: 1.1em;">숫자와 배수 카드를 맞춰서 승리하세요!</p>
        </div>

        <div id="setupModal" class="setup-modal show">
            <div class="modal-content">
                <div class="modal-title">게임 설정</div>

                <div style="text-align: left; margin: 20px 0;">
                    <label style="display: block; margin-bottom: 10px; font-weight: bold;">난이도 선택:</label>
                    <div class="difficulty-select">
                        <label>
                            <input type="radio" name="difficulty" value="easy" checked> 쉬움 (2의 배수 ~ 6의 배수)
                        </label>
                    </div>
                    <div class="difficulty-select">
                        <label>
                            <input type="radio" name="difficulty" value="medium"> 보통 (복합 배수)
                        </label>
                    </div>
                    <div class="difficulty-select">
                        <label>
                            <input type="radio" name="difficulty" value="hard"> 어려움 (3개 이상 배수)
                        </label>
                    </div>
                </div>

                <div style="text-align: left; margin: 20px 0;">
                    <label style="display: block; margin-bottom: 10px; font-weight: bold;">플레이어 수 (2~4명):</label>
                    <input type="number" id="playerCount" min="2" max="4" value="2" class="player-input">
                </div>

                <div id="playerInputs"></div>

                <button class="btn btn-primary" onclick="startGame()" style="width: 100%; margin-top: 20px;">게임 시작</button>
            </div>
        </div>

        <div id="gameContainer" style="display: none;">
            <div class="game-info">
                <div class="info-card">
                    <div class="info-label">⏱️ 남은 시간</div>
                    <div class="info-value timer" id="timer">10:00</div>
                </div>
                <div class="info-card">
                    <div class="info-label">🎴 남은 카드</div>
                    <div class="info-value" id="remainingCards">24</div>
                </div>
                <div class="info-card">
                    <div class="info-label">👥 현재 플레이어</div>
                    <div class="info-value" id="currentPlayer">-</div>
                </div>
            </div>

            <div class="players-section">
                <div class="players-grid" id="playersGrid"></div>
            </div>

            <div class="message" id="message" style="display: none;"></div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="resetGame()">게임 리셋</button>
                <button class="btn btn-secondary" onclick="location.reload()">처음부터</button>
            </div>

            <div class="game-board" id="gameBoard"></div>

            <div id="gameOver" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 게임 데이터
        const gameData = {
            easy: [
                { number: 12, multiple: "2의 배수" },
                { number: 18, multiple: "3의 배수" },
                { number: 20, multiple: "4의 배수" },
                { number: 25, multiple: "5의 배수" },
                { number: 30, multiple: "6의 배수" },
                { number: 14, multiple: "2의 배수" },
                { number: 27, multiple: "3의 배수" },
                { number: 24, multiple: "4의 배수" },
                { number: 35, multiple: "5의 배수" },
                { number: 36, multiple: "6의 배수" },
                { number: 16, multiple: "2의 배수" },
                { number: 21, multiple: "3의 배수" }
            ],
            medium: [
                { number: 36, multiple: "3과 4의 배수" },
                { number: 45, multiple: "5와 9의 배수" },
                { number: 48, multiple: "6과 8의 배수" },
                { number: 42, multiple: "6과 7의 배수" },
                { number: 54, multiple: "6과 9의 배수" },
                { number: 24, multiple: "2와 12의 배수" },
                { number: 60, multiple: "4와 10의 배수" },
                { number: 35, multiple: "5와 7의 배수" },
                { number: 56, multiple: "7과 8의 배수" },
                { number: 28, multiple: "4와 7의 배수" },
                { number: 72, multiple: "8과 9의 배수" },
                { number: 30, multiple: "5와 6의 배수" }
            ],
            hard: [
                { number: 60, multiple: "3, 4, 5의 배수" },
                { number: 120, multiple: "5, 6, 8의 배수" },
                { number: 84, multiple: "3, 4, 7의 배수" },
                { number: 90, multiple: "5, 6, 9의 배수" },
                { number: 72, multiple: "3, 8, 9의 배수" },
                { number: 105, multiple: "3, 5, 7의 배수" },
                { number: 140, multiple: "4, 5, 7의 배수" },
                { number: 36, multiple: "2, 4, 6의 배수" },
                { number: 108, multiple: "4, 6, 9의 배수" },
                { number: 144, multiple: "6, 8, 9의 배수" },
                { number: 210, multiple: "5, 6, 7의 배수" },
                { number: 56, multiple: "2, 4, 7의 배수" }
            ]
        };

        let gameState = {
            players: [],
            currentPlayer: 0,
            cards: [],
            flipped: [],
            matched: new Set(),
            gameRunning: false,
            timeLeft: 600,
            timerInterval: null,
            difficulty: 'easy'
        };

        // 플레이어 수 변경 시 입력 필드 업데이트
        document.addEventListener('DOMContentLoaded', () => {
            const playerCountInput = document.getElementById('playerCount');
            playerCountInput.addEventListener('change', updatePlayerInputs);
            updatePlayerInputs();
        });

        function updatePlayerInputs() {
            const count = parseInt(document.getElementById('playerCount').value);
            const container = document.getElementById('playerInputs');
            container.innerHTML = '';

            for (let i = 1; i <= count; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = `플레이어 ${i} 이름`;
                input.value = `플레이어 ${i}`;
                input.className = 'player-input';
                container.appendChild(input);
            }
        }

        function startGame() {
            const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
            const playerCount = parseInt(document.getElementById('playerCount').value);
            const inputs = document.querySelectorAll('#playerInputs input');

            gameState.difficulty = difficulty;
            gameState.players = Array.from(inputs).map(input => ({
                name: input.value || '플레이어',
                score: 0
            }));

            gameState.currentPlayer = 0;
            gameState.timeLeft = 600;
            gameState.matched = new Set();
            gameState.flipped = [];

            // 카드 초기화
            const cardSet = gameData[difficulty];
            gameState.cards = [];
            cardSet.forEach(card => {
                gameState.cards.push({ ...card, id: card.number + '_num' });
                gameState.cards.push({ ...card, id: card.number + '_mult' });
            });

            // 카드 섞기
            shuffleArray(gameState.cards);

            document.getElementById('setupModal').classList.remove('show');
            document.getElementById('gameContainer').style.display = 'block';

            gameState.gameRunning = true;
            renderGame();
            startTimer();
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function renderGame() {
            // 플레이어 정보 렌더링
            const playersGrid = document.getElementById('playersGrid');
            playersGrid.innerHTML = '';
            gameState.players.forEach((player, index) => {
                const playerCard = document.createElement('div');
                playerCard.className = 'player-card' + (index === gameState.currentPlayer ? ' active' : '');
                playerCard.innerHTML = `
                    <div class="player-name">${player.name}</div>
                    <div class="player-score">${player.score}장</div>
                `;
                playersGrid.appendChild(playerCard);
            });

            // 현재 플레이어 표시
            document.getElementById('currentPlayer').textContent = gameState.players[gameState.currentPlayer].name;

            // 게임 보드 렌더링
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            gameState.cards.forEach((card, index) => {
                const cardEl = document.createElement('button');
                cardEl.className = 'card';

                if (gameState.matched.has(index)) {
                    cardEl.classList.add('matched');
                    cardEl.disabled = true;
                } else if (gameState.flipped.includes(index)) {
                    cardEl.classList.add('flipped');
                    const isNumber = card.id.includes('_num');
                    cardEl.textContent = isNumber ? card.number : card.multiple;
                } else {
                    cardEl.innerHTML = '<span class="card-back">🂠</span>';
                }

                if (!gameState.matched.has(index)) {
                    cardEl.onclick = () => flipCard(index);
                }

                board.appendChild(cardEl);
            });

            // 남은 카드 수
            document.getElementById('remainingCards').textContent = 24 - gameState.matched.size;
        }

        function flipCard(index) {
            if (gameState.flipped.includes(index) || gameState.matched.has(index) || gameState.flipped.length === 2) {
                return;
            }

            gameState.flipped.push(index);
            renderGame();

            if (gameState.flipped.length === 2) {
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            const [idx1, idx2] = gameState.flipped;
            const card1 = gameState.cards[idx1];
            const card2 = gameState.cards[idx2];

            const isNumber1 = card1.id.includes('_num');
            const isNumber2 = card2.id.includes('_num');

            let isMatch = false;

            if (isNumber1 !== isNumber2 && card1.number === card2.number) {
                isMatch = true;
            }

            showMessage(
                isMatch ? `✅ 맞았습니다! ${gameState.players[gameState.currentPlayer].name}님이 카드를 얻었습니다!` : '❌ 틀렸습니다! 다음 플레이어 차례입니다.',
                isMatch ? 'success' : 'error'
            );

            if (isMatch) {
                gameState.matched.add(idx1);
                gameState.matched.add(idx2);
                gameState.players[gameState.currentPlayer].score += 2;

                if (gameState.matched.size === 24) {
                    endGame();
                } else {
                    // 보너스 턴
                    gameState.flipped = [];
                    setTimeout(renderGame, 1500);
                }
            } else {
                gameState.flipped = [];
                gameState.currentPlayer = (gameState.currentPlayer + 1) % gameState.players.length;
                setTimeout(renderGame, 1500);
            }
        }

        function startTimer() {
            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft--;
                updateTimer();

                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function updateTimer() {
            const minutes = Math.floor(gameState.timeLeft / 60);
            const seconds = gameState.timeLeft % 60;
            const timerEl = document.getElementById('timer');
            timerEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

            if (gameState.timeLeft <= 60) {
                timerEl.classList.add('warning');
            } else {
                timerEl.classList.remove('warning');
            }
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'flex';
            setTimeout(() => {
                message.style.display = 'none';
            }, 2000);
        }

        function endGame() {
            gameState.gameRunning = false;
            clearInterval(gameState.timerInterval);

            const sorted = [...gameState.players].sort((a, b) => b.score - a.score);
            const gameOverDiv = document.getElementById('gameOver');

            let html = '<div class="game-over"><h2>🎉 게임 종료!</h2>';
            html += '<div class="final-scores">';
            sorted.forEach((player, index) => {
                const medal = ['🥇', '🥈', '🥉'][index] || '  ';
                html += `<div class="final-score-item">${medal} ${player.name}: <strong>${player.score}장</strong></div>`;
            });
            html += '</div>';
            html += `<p style="margin-top: 20px; font-size: 1.3em;">🏆 우승자: <strong>${sorted[0].name}</strong></p>`;
            html += '</div>';

            gameOverDiv.innerHTML = html;
            gameOverDiv.style.display = 'block';

            document.getElementById('gameBoard').style.display = 'none';
        }

        function resetGame() {
            clearInterval(gameState.timerInterval);
            gameState = {
                players: gameState.players,
                currentPlayer: 0,
                cards: [],
                flipped: [],
                matched: new Set(),
                gameRunning: false,
                timeLeft: 600,
                timerInterval: null,
                difficulty: gameState.difficulty
            };

            // 카드 재초기화
            const cardSet = gameData[gameState.difficulty];
            gameState.cards = [];
            cardSet.forEach(card => {
                gameState.cards.push({ ...card, id: card.number + '_num' });
                gameState.cards.push({ ...card, id: card.number + '_mult' });
            });

            shuffleArray(gameState.cards);

            gameState.gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('gameBoard').style.display = 'grid';

            // 점수 초기화
            gameState.players.forEach(player => {
                player.score = 0;
            });

            renderGame();
            startTimer();
        }
    </script>
</body>
</html>
