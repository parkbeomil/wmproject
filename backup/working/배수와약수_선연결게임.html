<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배수와 약수 - 선 연결 게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    user-select: none;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
    color: white;
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 800;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    margin-bottom: 4px;
  }

  .header p {
    font-size: 1rem;
    opacity: 0.9;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls button {
    padding: 10px 24px;
    border: none;
    border-radius: 50px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  }

  .btn-reset {
    background: white;
    color: #764ba2;
  }

  .btn-reset:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

  .btn-check {
    background: #ffd700;
    color: #333;
  }

  .btn-check:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

  .btn-new {
    background: #4ade80;
    color: #1a5c2e;
  }

  .btn-new:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

  .difficulty {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .difficulty button {
    padding: 8px 20px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50px;
    background: transparent;
    color: white;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }

  .difficulty button.active {
    background: white;
    color: #764ba2;
    border-color: white;
  }

  .difficulty button:hover:not(.active) {
    background: rgba(255,255,255,0.2);
  }

  .game-container {
    background: white;
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
    width: 100%;
    max-width: 700px;
  }

  .game-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding: 0 10px;
  }

  .game-info .label {
    font-size: 0.85rem;
    font-weight: 700;
    color: #764ba2;
    background: #f0e6ff;
    padding: 6px 16px;
    border-radius: 50px;
  }

  .score-display {
    font-size: 0.9rem;
    font-weight: 700;
    color: #4ade80;
  }

  .game-area {
    position: relative;
    min-height: 400px;
  }

  svg.lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .columns {
    display: flex;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  .column {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 130px;
  }

  .node {
    width: 130px;
    height: 56px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    border: 3px solid transparent;
  }

  .node-left {
    background: #e0f2fe;
    color: #0369a1;
    border-color: #7dd3fc;
  }

  .node-left:hover, .node-left.selected {
    background: #0ea5e9;
    color: white;
    border-color: #0284c7;
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(14,165,233,0.4);
  }

  .node-right {
    background: #fce7f3;
    color: #be185d;
    border-color: #f9a8d4;
  }

  .node-right:hover, .node-right.selected {
    background: #ec4899;
    color: white;
    border-color: #db2777;
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(236,72,153,0.4);
  }

  .node.connected {
    opacity: 0.5;
    pointer-events: none;
    transform: scale(0.95);
  }

  .node.correct {
    border-color: #22c55e !important;
    background: #dcfce7 !important;
    color: #166534 !important;
    opacity: 1 !important;
  }

  .node.wrong {
    border-color: #ef4444 !important;
    background: #fee2e2 !important;
    color: #991b1b !important;
    opacity: 1 !important;
    animation: shake 0.5s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .connection-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }

  .node-left .connection-dot {
    right: -7px;
    background: #7dd3fc;
    border: 2px solid #0ea5e9;
  }

  .node-right .connection-dot {
    left: -7px;
    background: #f9a8d4;
    border: 2px solid #ec4899;
  }

  .node-left.selected .connection-dot {
    background: #0284c7;
    border-color: white;
  }

  .node-right.selected .connection-dot {
    background: #db2777;
    border-color: white;
  }

  .result-banner {
    display: none;
    text-align: center;
    margin-top: 20px;
    padding: 20px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 1.1rem;
    animation: fadeIn 0.5s ease;
  }

  .result-banner.show { display: block; }

  .result-banner.perfect {
    background: linear-gradient(135deg, #dcfce7, #bbf7d0);
    color: #166534;
  }

  .result-banner.partial {
    background: linear-gradient(135deg, #fef9c3, #fef08a);
    color: #854d0e;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hint-box {
    margin-top: 16px;
    padding: 16px 20px;
    background: #f8fafc;
    border-radius: 12px;
    border-left: 4px solid #764ba2;
  }

  .hint-box h3 {
    font-size: 0.85rem;
    color: #764ba2;
    margin-bottom: 6px;
  }

  .hint-box p {
    font-size: 0.82rem;
    color: #64748b;
    line-height: 1.6;
  }

  .pair-explanation {
    display: none;
    margin-top: 16px;
    padding: 16px 20px;
    background: #f0fdf4;
    border-radius: 12px;
    border: 1px solid #bbf7d0;
  }

  .pair-explanation.show { display: block; }

  .pair-explanation h3 {
    font-size: 0.9rem;
    color: #166534;
    margin-bottom: 8px;
  }

  .pair-explanation ul {
    list-style: none;
    padding: 0;
  }

  .pair-explanation li {
    font-size: 0.82rem;
    color: #15803d;
    padding: 4px 0;
    line-height: 1.5;
  }

  .pair-explanation li::before {
    content: '✓ ';
    font-weight: 700;
  }

  .pair-explanation li.wrong-pair {
    color: #dc2626;
  }

  .pair-explanation li.wrong-pair::before {
    content: '✗ ';
  }
</style>
</head>
<body>

<div class="header">
  <h1>배수와 약수 선 연결 게임</h1>
  <p>왼쪽 약수와 오른쪽 배수를 선으로 연결하세요!</p>
</div>

<div class="difficulty">
  <button class="active" onclick="setDifficulty('easy')">쉬움</button>
  <button onclick="setDifficulty('medium')">보통</button>
  <button onclick="setDifficulty('hard')">어려움</button>
</div>

<div class="controls">
  <button class="btn-reset" onclick="resetConnections()">🔄 다시하기</button>
  <button class="btn-check" onclick="checkAnswers()">✅ 정답 확인</button>
  <button class="btn-new" onclick="newGame()">🎲 새 문제</button>
</div>

<div class="game-container">
  <div class="game-info">
    <span class="label" id="modeLabel">약수 → 배수</span>
    <span class="score-display" id="scoreDisplay">점수: 0</span>
  </div>

  <div class="game-area" id="gameArea">
    <svg class="lines" id="linesSvg"></svg>
    <div class="columns" id="columns"></div>
  </div>

  <div class="result-banner" id="resultBanner"></div>

  <div class="pair-explanation" id="pairExplanation">
    <h3>풀이 설명</h3>
    <ul id="explanationList"></ul>
  </div>

  <div class="hint-box">
    <h3>💡 배수와 약수란?</h3>
    <p>
      <strong>약수</strong>: 어떤 수를 나누어떨어지게 하는 수<br>
      <strong>배수</strong>: 어떤 수에 자연수를 곱하여 얻는 수<br>
      예) 3 × 4 = 12 → 3은 12의 <strong>약수</strong>, 12는 3의 <strong>배수</strong>
    </p>
  </div>
</div>

<script>
const DIFFICULTY = {
  easy: {
    pairs: 4,
    divisors: [2, 3, 4, 5, 6],
    maxMultiplier: 5
  },
  medium: {
    pairs: 5,
    divisors: [3, 4, 5, 6, 7, 8, 9],
    maxMultiplier: 8
  },
  hard: {
    pairs: 6,
    divisors: [6, 7, 8, 9, 11, 12, 13, 15],
    maxMultiplier: 12
  }
};

let currentDifficulty = 'easy';
let pairs = [];
let connections = [];
let selectedNode = null;
let score = 0;
let checked = false;

function setDifficulty(level) {
  currentDifficulty = level;
  document.querySelectorAll('.difficulty button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  newGame();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generatePairs() {
  const config = DIFFICULTY[currentDifficulty];
  const result = [];
  const usedDivisors = new Set();
  const usedMultiples = new Set();
  const availableDivisors = shuffle(config.divisors);

  for (const d of availableDivisors) {
    if (result.length >= config.pairs) break;
    const possibleMultipliers = [];
    for (let m = 2; m <= config.maxMultiplier; m++) {
      const multiple = d * m;
      if (!usedMultiples.has(multiple) && multiple <= 150) {
        possibleMultipliers.push(m);
      }
    }
    if (possibleMultipliers.length === 0) continue;
    const m = possibleMultipliers[Math.floor(Math.random() * possibleMultipliers.length)];
    const multiple = d * m;
    usedDivisors.add(d);
    usedMultiples.add(multiple);
    result.push({ divisor: d, multiple: multiple, multiplier: m });
  }

  return result;
}

function newGame() {
  checked = false;
  connections = [];
  selectedNode = null;
  pairs = generatePairs();

  document.getElementById('resultBanner').className = 'result-banner';
  document.getElementById('pairExplanation').className = 'pair-explanation';

  renderGame();
}

function renderGame() {
  const columnsEl = document.getElementById('columns');
  const leftNumbers = shuffle(pairs.map((p, i) => ({ value: p.divisor, index: i })));
  const rightNumbers = shuffle(pairs.map((p, i) => ({ value: p.multiple, index: i })));

  let leftHTML = '<div class="column">';
  leftNumbers.forEach(item => {
    leftHTML += `
      <div class="node node-left" data-side="left" data-index="${item.index}" data-value="${item.value}"
           onclick="onNodeClick(this)">
        ${item.value}
        <div class="connection-dot"></div>
      </div>`;
  });
  leftHTML += '</div>';

  let rightHTML = '<div class="column">';
  rightNumbers.forEach(item => {
    rightHTML += `
      <div class="node node-right" data-side="right" data-index="${item.index}" data-value="${item.value}"
           onclick="onNodeClick(this)">
        <div class="connection-dot"></div>
        ${item.value}
      </div>`;
  });
  rightHTML += '</div>';

  columnsEl.innerHTML = leftHTML + rightHTML;
  drawLines();
}

function onNodeClick(el) {
  if (checked) return;

  const side = el.dataset.side;
  const index = parseInt(el.dataset.index);

  // Check if already connected
  const existingConn = connections.find(c =>
    (side === 'left' && c.leftIndex === index) ||
    (side === 'right' && c.rightIndex === index)
  );

  if (existingConn) {
    // Remove existing connection
    connections = connections.filter(c => c !== existingConn);
    document.querySelectorAll('.node').forEach(n => {
      const nSide = n.dataset.side;
      const nIdx = parseInt(n.dataset.index);
      if ((nSide === 'left' && nIdx === existingConn.leftIndex) ||
          (nSide === 'right' && nIdx === existingConn.rightIndex)) {
        n.classList.remove('connected');
      }
    });
    selectedNode = null;
    document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
    drawLines();
    return;
  }

  if (!selectedNode) {
    selectedNode = { side, index, el };
    el.classList.add('selected');
  } else {
    if (selectedNode.side === side) {
      selectedNode.el.classList.remove('selected');
      selectedNode = { side, index, el };
      el.classList.add('selected');
    } else {
      const leftIdx = side === 'left' ? index : selectedNode.index;
      const rightIdx = side === 'right' ? index : selectedNode.index;

      connections.push({ leftIndex: leftIdx, rightIndex: rightIdx });

      document.querySelectorAll('.node').forEach(n => {
        const nSide = n.dataset.side;
        const nIdx = parseInt(n.dataset.index);
        if ((nSide === 'left' && nIdx === leftIdx) || (nSide === 'right' && nIdx === rightIdx)) {
          n.classList.add('connected');
        }
        n.classList.remove('selected');
      });

      selectedNode = null;
      drawLines();
    }
  }
}

function drawLines() {
  const svg = document.getElementById('linesSvg');
  const gameArea = document.getElementById('gameArea');
  const rect = gameArea.getBoundingClientRect();

  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);

  connections.forEach((conn, ci) => {
    const leftNode = document.querySelector(`.node-left[data-index="${conn.leftIndex}"]`);
    const rightNode = document.querySelector(`.node-right[data-index="${conn.rightIndex}"]`);

    if (!leftNode || !rightNode) return;

    const lRect = leftNode.getBoundingClientRect();
    const rRect = rightNode.getBoundingClientRect();

    const x1 = lRect.right - rect.left;
    const y1 = lRect.top + lRect.height / 2 - rect.top;
    const x2 = rRect.left - rect.left;
    const y2 = rRect.top + rRect.height / 2 - rect.top;

    const isCorrect = conn.leftIndex === conn.rightIndex;
    let color = '#a78bfa';
    let strokeWidth = 3;

    if (checked) {
      color = isCorrect ? '#22c55e' : '#ef4444';
      strokeWidth = isCorrect ? 4 : 3;
    }

    const midX = (x1 + x2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', strokeWidth);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');

    if (checked && !isCorrect) {
      path.setAttribute('stroke-dasharray', '8 6');
    }

    svg.appendChild(path);
  });
}

function checkAnswers() {
  if (connections.length === 0) return;
  checked = true;

  let correct = 0;

  connections.forEach(conn => {
    const isCorrect = conn.leftIndex === conn.rightIndex;
    if (isCorrect) correct++;

    document.querySelectorAll('.node').forEach(n => {
      const side = n.dataset.side;
      const idx = parseInt(n.dataset.index);
      if ((side === 'left' && idx === conn.leftIndex) || (side === 'right' && idx === conn.rightIndex)) {
        n.classList.remove('connected');
        n.classList.add(isCorrect ? 'correct' : 'wrong');
      }
    });
  });

  score += correct;
  document.getElementById('scoreDisplay').textContent = `점수: ${score}`;

  const banner = document.getElementById('resultBanner');
  if (correct === pairs.length) {
    banner.className = 'result-banner show perfect';
    banner.textContent = `🎉 완벽해요! ${correct}/${pairs.length} 모두 정답!`;
  } else {
    banner.className = 'result-banner show partial';
    banner.textContent = `${correct}/${pairs.length} 정답! 틀린 것을 확인하고 다시 도전해보세요.`;
  }

  // Show explanation
  const expEl = document.getElementById('pairExplanation');
  const listEl = document.getElementById('explanationList');
  listEl.innerHTML = '';

  connections.forEach(conn => {
    const isCorrect = conn.leftIndex === conn.rightIndex;
    const pair = pairs[conn.leftIndex];
    const connectedMultiple = pairs[conn.rightIndex].multiple;
    const li = document.createElement('li');

    if (isCorrect) {
      li.textContent = `${pair.divisor} × ${pair.multiplier} = ${pair.multiple} → ${pair.divisor}은(는) ${pair.multiple}의 약수, ${pair.multiple}은(는) ${pair.divisor}의 배수`;
    } else {
      li.className = 'wrong-pair';
      li.textContent = `${pair.divisor} → ${connectedMultiple}: ${connectedMultiple} ÷ ${pair.divisor} = ${(connectedMultiple / pair.divisor).toFixed(2)} (나누어떨어지지 않음)`;
    }
    listEl.appendChild(li);
  });

  // Show unconnected pairs
  const connectedLefts = new Set(connections.map(c => c.leftIndex));
  pairs.forEach((pair, i) => {
    if (!connectedLefts.has(i)) {
      const li = document.createElement('li');
      li.className = 'wrong-pair';
      li.textContent = `${pair.divisor} → ${pair.multiple}: 연결하지 않음 (${pair.divisor} × ${pair.multiplier} = ${pair.multiple})`;
      listEl.appendChild(li);
    }
  });

  expEl.className = 'pair-explanation show';
  drawLines();
}

function resetConnections() {
  checked = false;
  connections = [];
  selectedNode = null;

  document.querySelectorAll('.node').forEach(n => {
    n.classList.remove('connected', 'selected', 'correct', 'wrong');
  });

  document.getElementById('resultBanner').className = 'result-banner';
  document.getElementById('pairExplanation').className = 'pair-explanation';
  drawLines();
}

// Handle window resize
window.addEventListener('resize', () => {
  requestAnimationFrame(drawLines);
});

// Initialize
newGame();
</script>

</body>
</html>
